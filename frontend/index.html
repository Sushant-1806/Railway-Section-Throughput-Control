<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Railway Traffic Control System</title>
    <meta name="description" content="AI-Powered Real-Time Railway Traffic Control — SIH 2025" />
    <link rel="icon" type="image/svg+xml" href="/train.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      (() => {
        try {
          const raw = localStorage.getItem('railway-theme')
          let theme = 'dark'

          if (raw) {
            const parsed = JSON.parse(raw)
            const storedTheme = parsed?.state?.theme
            if (storedTheme === 'light' || storedTheme === 'dark') {
              theme = storedTheme
            }
          } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            theme = 'light'
          }

          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
        } catch {
          document.documentElement.dataset.theme = 'dark'
          document.documentElement.style.colorScheme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
